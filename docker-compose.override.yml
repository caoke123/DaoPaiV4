# DaoPai V3 开发环境覆盖配置
#
# 说明：
#   - V3 保留 postgres 端口映射（5436:5432），本地开发时后端通过 127.0.0.1:5436 连接 PG
#   - V3 与 V2 完全隔离（V2 为 5435/6380）
#   - 此文件保留为空覆盖，避免影响 docker-compose.yml 的默认配置
services:
  postgres:
    # 开发环境保留端口映射，方便本地直连 PG 排查
    ports:
      - "5436:5432"
  redis:
    # 开发环境保留 Redis 端口映射，方便本地排查
    ports:
      - "6381:6379"
